  .skin-colors { margin-top:4px; padding-left:20px; }

  .color-row .qty { color: var(--sub); font-weight:500; }
  .note {

    .kpi .num { font-size: 19px; }

    .card { padding: 12px; border-radius: 10px; }
    .filters { gap: 6px; }
    .filter-btn { padding: 5px 11px; font-size: 12px; }
    .color-row { max-width: none; }
  }
</style>
</head>

function statusBadge(r) {
  let cls = 'b-new', label = r.effective_status;
  if (r.effective_status === 'Done') { cls = 'b-done'; }
  else if (r.effective_status.indexOf('ON PROCESS') === 0) { cls = 'b-process'; }
  return '<span class="badge ' + cls + '">' + label + '</span>';
}
function flagBadges(r) {
  let out = '';
  if (r.overdue) out += ' <span class="badge b-overdue">เลยกำหนด Plan</span>';
  if (r.stale) out += ' <span class="badge b-stale">ค้าง ' + r.age_days + ' วัน ไม่มี ETA</span>';
  return out;
}

// ---------- Overview ----------
function renderOverview() {
  const reqs = DATA.requests;
  const done = reqs.filter(r => r.effective_status === 'Done').length;
  const proc = reqs.filter(r => r.effective_status.indexOf('ON PROCESS') === 0).length;
  const neu = reqs.filter(r => r.effective_status === 'New / รอตอบรับ').length;
  const overdue = reqs.filter(r => r.overdue).length;
  const stale = reqs.filter(r => r.stale).length;

  let html = '<div class="kpi-row">';
  html += kpi(reqs.length, 'คำขอทั้งหมด', '');
  html += kpi(neu, 'ใหม่ / รอตอบรับ', 'amber');
  html += kpi(proc, 'กำลังผลิต', '');
  html += kpi(done, 'เสร็จแล้ว', 'green');
  html += kpi(overdue, 'เลยกำหนด Plan', overdue ? 'warn' : '');
  html += kpi(stale, 'ค้างนาน ไม่มี ETA', stale ? 'warn' : '');
  html += '</div>';

  html += '<div class="card"><h2>รายการคำขอทั้งหมด</h2>';
  html += '<div class="filters" id="statusFilters">' +
    filterBtn('all','ทั้งหมด',true) + filterBtn('new','ใหม่/รอตอบรับ') +
    filterBtn('process','กำลังผลิต') + filterBtn('done','เสร็จแล้ว') +
    filterBtn('flag','มีปัญหา (เลยกำหนด/ค้างนาน)') + '</div>';
  html += '<div id="reqTableWrap">' + reqTable(reqs) + '</div>';
  html += '</div>';

  document.getElementById('overview').innerHTML = html;

  document.querySelectorAll('#statusFilters .filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#statusFilters .filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const f = btn.dataset.f;
      let filtered = reqs;
      if (f === 'new') filtered = reqs.filter(r=>r.effective_status==='New / รอตอบรับ');
      else if (f === 'process') filtered = reqs.filter(r=>r.effective_status.indexOf('ON PROCESS')===0);
      else if (f === 'done') filtered = reqs.filter(r=>r.effective_status==='Done');
      else if (f === 'flag') filtered = reqs.filter(r=>r.overdue||r.stale);
      document.getElementById('reqTableWrap').innerHTML = reqTable(filtered);
    });
  });
}
function kpi(num, label, cls) {
  return '<div class="kpi ' + (cls||'') + '"><div class="num">' + num + '</div><div class="label">' + label + '</div></div>';
}
function filterBtn(f, label, active) {
  return '<button class="filter-btn' + (active?' active':'') + '" data-f="' + f + '">' + label + '</button>';
}
function reqTable(reqs) {
  let rows = reqs.slice().sort((a,b) => (b.timestamp||'').localeCompare(a.timestamp||''));
  let html = '<div class="table-scroll"><table><thead><tr><th>วันที่แจ้ง</th><th>รุ่น</th><th>หนัง/สี</th><th>จำนวน</th>' +
    '<th>ผู้แจ้ง</th><th>สถานะ</th><th>Plan เข้า</th><th>หมายเหตุ</th></tr></thead><tbody>';
  rows.forEach(r => {
    html += '<tr><td>' + (r.timestamp||'-') + '<div class="small">' + (r.age_days!=null?r.age_days+' วันที่แล้ว':'') + '</div></td>' +
      '<td>' + (r.model || '<i>'+(r.others||'(ไม่ระบุ)')+'</i>') + '<div class="small">' + (r.size?'size '+r.size:'') + '</div></td>' +
      '<td>' + r.skin1 + (r.color? ' — '+r.color : '') + (r.skin2? '<div class="small">skin2: '+r.skin2+'</div>':'') + '</td>' +
      '<td>' + (r.qty1||'-') + (r.qty2? ' / '+r.qty2 : '') + '</td>' +
      '<td>' + r.requester + '</td>' +
      '<td>' + statusBadge(r) + flagBadges(r) + '</td>' +
      '<td>' + (r.plan_raw || '-') + '</td>' +
      '<td class="small">' + (r.reply || '') + '</td>' +
      '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

// ---------- Production ----------
function renderProduction() {
  const reqs = DATA.requests.filter(r => r.effective_status !== 'Done');
  const withPlan = reqs.filter(r=>r.plan_parsed).sort((a,b)=> a.plan_parsed.localeCompare(b.plan_parsed));
  const noPlan = reqs.filter(r=>!r.plan_parsed);

  // skin demand summary (open requests only)
  const skinTotals = {};
  reqs.forEach(r => {
    const q = parseFloat(r.qty1) || 0;
    if (r.skin1) skinTotals[r.skin1] = (skinTotals[r.skin1]||0) + q;
    const q2 = parseFloat(r.qty2) || 0;
    if (r.skin2) skinTotals[r.skin2] = (skinTotals[r.skin2]||0) + q2;
  });
  const skinRows = Object.entries(skinTotals).sort((a,b)=>b[1]-a[1]);

  let html = '<div class="card"><h2>คิวงานเรียงตาม Plan สินค้าเข้า (ใกล้สุดก่อน)</h2>';
  html += reqTable(withPlan);
  html += '</div>';

  html += '<div class="card"><h2>ค้างอยู่ ยังไม่มีกำหนด Plan (' + noPlan.length + ' รายการ)</h2>';
  html += '<p class="small">รายการเหล่านี้ต้องติดตามเป็นพิเศษ เพราะไม่มีวันที่คาดว่าสินค้าจะเข้า</p>';
  html += reqTable(noPlan);
  html += '</div>';

  html += '<div class="card"><h2>สรุปความต้องการหนัง (Skin) รวม — จากคำขอที่ยังไม่เสร็จ</h2>';
  html += '<div class="table-scroll"><table><thead><tr><th>ประเภทหนัง</th><th>จำนวนที่ขอรวม (ใบ/ชิ้น)</th></tr></thead><tbody>';
  skinRows.forEach(([skin, qty]) => {
    html += '<tr><td>' + skin + '</td><td>' + qty + '</td></tr>';
  });
  html += '</tbody></table></div></div>';

  document.getElementById('production').innerHTML = html;
}

    if (n.indexOf(key) !== -1) return hex;
  }
  return '#3a3530';
}
function colorSpan(name) {
  return '<span class="color-chip" style="color:' + colorHex(name) + '">' + name + '</span>';
}
function colorRow(c) {
  return '<div class="color-row">' + colorSpan(c.name) + '<span class="qty">' + c.qty + ' ชิ้น</span></div>';
}

// ---------- Sales ----------
function renderSales() {
  const models = Object.keys(DATA.model_summary);
  let html = '<div class="card"><p class="small">เทียบคำขอสินค้าที่ค้างอยู่กับสต็อกคงเหลือปัจจุบัน (ไฟล์ Stock ' +
    'ที่พี่โจ้อัพโหลด) และยอดขายในอดีต (จาก Project knowledge base) เพื่อช่วยจัดลำดับความสำคัญว่ารุ่นไหนควรเร่ง</p></div>';

  models.forEach(m => {
    const info = DATA.model_summary[m];
    const openReqs = DATA.requests.filter(r => r.model === m && r.effective_status !== 'Done');
    const stock = info.stock || {};
    const histSkin = info.historical_by_skin || [];

    html += '<div class="model-card"><h3>' + m + '</h3>';
    html += '<div class="small">จับคู่กับสต็อก/ยอดขายในชื่อรุ่น: ' + (stock.stock_models_matched||[]).join(', ') + '</div>';
    html += '<div class="model-grid">';

    html += '<div><div class="col-title">สต็อกคงเหลือปัจจุบัน (17 สาขาที่ดูแล) &mdash; รวม ' + (stock.total_qty!=null?stock.total_qty:'-') + ' ชิ้น</div>';
    if ((stock.by_skin||[]).length === 0) html += '<div class="small">ไม่มีสต็อกใน 17 สาขาที่ดูแล</div>';
    (stock.by_skin || []).forEach(s => {
      html += '<details class="skin-block">';
      html += '<summary class="skin-title"><span class="skin-name"><span class="chev">&#9656;</span>' + s.skin + '</span><span>' + s.qty + ' ชิ้น</span></summary>';
      html += '<div class="skin-colors">' + (s.colors||[]).map(colorRow).join('') + '</div>';
      html += '</details>';
    });
    html += '</div>';

    html += '<div><div class="col-title">คำขอที่ยังค้างอยู่ (' + openReqs.length + ')</div>';
    if (openReqs.length === 0) html += '<div class="small">ไม่มีคำขอค้าง</div>';
    openReqs.forEach(r => {
      html += '<div class="mini-row"><span>' + r.skin1 + ' / ' + r.color + ' (' + (r.qty1||'-') + ')</span>' +
        '<span>' + statusBadge(r) + '</span></div>';
    });
    html += '</div>';

    html += '</div></div>';
  });

  document.getElementById('sales').innerHTML = html;
}

renderOverview();
renderProduction();
renderSales();

    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
  });
});
