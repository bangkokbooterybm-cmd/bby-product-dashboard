<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>BBY Product Request & Stock Tracker</title>
<style>
  :root {
    color-scheme: light;
    --bg: #faf8f5; --card: #ffffff; --ink: #2b2320; --sub: #7a6f66;
    --line: #e8e0d8; --accent: #8a5a3b; --accent2: #b8895f;
    --green: #3a7d5c; --greenbg: #e7f3ec;
    --amber: #b3791f; --amberbg: #fbf0dd;
    --red: #b23b3b; --redbg: #fbe9e9;
    --blue: #3a5f8a; --bluebg: #e9f0f8;
    --grey: #8a8078; --greybg: #f0ece7;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, "Segoe UI", "Noto Sans Thai", "Sarabun", sans-serif;
    background: var(--bg); color: var(--ink); margin: 0; padding: 24px;
    font-size: 14px; line-height: 1.5; overflow-x: hidden;
  }
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -2px; }
  .table-scroll table { min-width: 640px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  h2 { font-size: 16px; margin: 0 0 12px; color: var(--accent); }
  .sub { color: var(--sub); font-size: 12.5px; margin-bottom: 18px; }
  .tabs { display: flex; gap: 6px; margin-bottom: 20px; border-bottom: 1px solid var(--line); }
  .tab-btn {
    padding: 9px 18px; border: none; background: none; cursor: pointer;
    font-size: 14px; color: var(--sub); border-bottom: 2px solid transparent;
    font-family: inherit; font-weight: 600;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .kpi-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 22px; }
  .kpi {
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    padding: 14px 18px; min-width: 130px; flex: 1;
  }
  .kpi .num { font-size: 24px; font-weight: 700; }
  .kpi .label { font-size: 12px; color: var(--sub); margin-top: 2px; }
  .kpi.warn .num { color: var(--red); }
  .kpi.amber .num { color: var(--amber); }
  .kpi.green .num { color: var(--green); }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 18px; margin-bottom: 18px;
  }
  .card-collapse {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 18px; margin-bottom: 18px;
  }
  .card-collapse summary { list-style:none; cursor:pointer; }
  .card-collapse summary::-webkit-details-marker { display:none; }
  .card-collapse-title { font-size:16px; font-weight:600; color:var(--sub); display:flex; align-items:center; }
  .card-collapse-title .chev { font-size:12px; margin-right:8px; transition:transform .15s; display:inline-block; }
  .card-collapse[open] > .card-collapse-title .chev { transform: rotate(90deg); }
  .card-collapse-body { margin-top:14px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; color: var(--sub); font-weight: 600;
       border-bottom: 1px solid var(--line); white-space: nowrap; }
  td { padding: 8px 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
  .date-cell { white-space: nowrap; }
  .plan-cell { white-space: nowrap; min-width: 110px; }
  tr:hover td { background: #fbf9f6; }
  tr.row-done td { background: #a8e3bd; }
  tr.row-process td { background: var(--amberbg); }
  tr.row-reject td { background: #f0a3a3; }
  tr.row-new td { background: #aecdeb; }
  .badge {
    display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11.5px;
    font-weight: 600; white-space: nowrap;
  }
  .b-done { background: var(--greenbg); color: var(--green); }
  .b-process { background: var(--amberbg); color: var(--amber); }
  .b-reject { background: var(--redbg); color: var(--red); }
  .b-new { background: var(--bluebg); color: var(--blue); }
  .b-overdue { background: var(--redbg); color: var(--red); }
  .b-stale { background: var(--amberbg); color: var(--amber); }
  .b-urgent { background: var(--red); color: #fff; font-weight:700; }
  .stock-cell-block { min-width: 140px; }
  .stock-cell-block summary { list-style:none; cursor:pointer; font-size:12.5px; color:var(--accent); font-weight:600; }
  .stock-cell-block summary::-webkit-details-marker { display:none; }
  .stock-cell-block .chev { color:var(--sub); font-size:11px; margin-right:4px; display:inline-block; transition:transform .15s; }
  .stock-cell-block[open] summary .chev { transform: rotate(90deg); }
  .stock-cell-body { margin-top:4px; max-width: 420px; }
  .stock-cell-body .model-block { padding:4px 0; }
  .stock-cell-body .model-sub-title { font-size:13px; }
  .filters-row { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:14px; }
  .filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:0; }
  .status-legend { display:flex; gap:14px; flex-wrap:wrap; font-size:11.5px; color:var(--sub); }
  .legend-item { display:flex; align-items:center; gap:5px; }
  .legend-dot { width:11px; height:11px; border-radius:3px; display:inline-block; }
  .filter-btn {
    border:1px solid var(--line); background:#fff; border-radius:20px; padding:5px 14px;
    font-size:12.5px; cursor:pointer; font-family:inherit; color: var(--ink);
  }
  .filter-btn.active { background: var(--accent); color:#fff; border-color: var(--accent); }
  .model-card { border:1px solid var(--line); border-radius:10px; padding:16px; margin-bottom:14px; }
  .cal-month { margin-bottom:26px; }
  .cal-month h3 { font-size:15.5px; color:var(--accent); margin:0 0 10px; }
  .cal-week-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:12px; }
  .cal-week-card { border:1px solid var(--line); border-radius:10px; padding:10px 12px; background:var(--card); }
  .cal-week-title { font-size:12px; font-weight:700; color:var(--sub); text-transform:uppercase; letter-spacing:.03em;
    border-bottom:1px solid var(--line); padding-bottom:6px; margin-bottom:8px; }
  .cal-section-label { font-size:11px; font-weight:700; color:var(--accent2); margin:8px 0 3px; }
  .cal-item { font-size:12px; padding:3px 0; border-bottom:1px dashed var(--line); }
  .cal-item .cal-item-qty { color:var(--sub); font-weight:600; }
  .cal-empty { font-size:11.5px; color:var(--sub); font-style:italic; }
  .cal-total { display:flex; justify-content:space-between; font-size:12.5px; font-weight:700;
    border-top:1px solid var(--line); margin-top:8px; padding-top:6px; }
  .model-card h3 { margin:0 0 8px; font-size:15px; }
  .core-divider { font-size:14px; color:var(--sub); margin:24px 0 10px; padding-top:14px; border-top:1px dashed var(--line); }
  .bestseller-note { margin-top:10px; color:var(--sub); }
  .bestseller-alert { margin-top:12px; background:var(--redbg); border:1px solid #e3b3b3; border-radius:8px; padding:10px 12px; max-width:480px; }
  .bestseller-alert-title { font-weight:700; color:var(--red); font-size:13px; margin-bottom:6px; }
  .bestseller-row { font-size:12.5px; padding:6px 0; border-bottom:1px dashed #e3b3b3; }
  .bestseller-row:last-child { border-bottom:none; }
  .bestseller-row-label { font-weight:600; margin-bottom:2px; }
  .bestseller-row-value { color:var(--sub); }
  .model-grid { display:grid; grid-template-columns: 1fr 1.7fr; gap:20px; margin-top:10px; }
  .model-grid .col-title { font-size:11.5px; color:var(--sub); text-transform:uppercase; letter-spacing:.03em; margin-bottom:6px; }
  .mini-row { display:flex; justify-content:space-between; font-size:12.5px; padding:3px 0; border-bottom:1px dashed var(--line); }
  .req-size-label { font-size:11.5px; font-weight:700; color:var(--accent2); text-transform:uppercase; letter-spacing:.02em; margin:10px 0 3px; }
  .model-block { padding:7px 0; border-bottom:1px solid var(--line); }
  .model-block summary { list-style:none; cursor:pointer; }
  .model-block summary::-webkit-details-marker { display:none; }
  .model-sub-title { display:flex; justify-content:space-between; align-items:center; font-size:15.5px; font-weight:700; color:var(--accent); }
  .model-sub-title .chev { color:var(--sub); font-size:12px; margin-right:8px; transition:transform .15s; display:inline-block; }
  .model-block[open] > .model-sub-title .chev { transform: rotate(90deg); }
  .model-sub-body { margin-top:4px; padding-left:18px; }

  .leather-block { padding:6px 0; border-bottom:1px solid var(--line); }
  .leather-block summary { list-style:none; cursor:pointer; }
  .leather-block summary::-webkit-details-marker { display:none; }
  .leather-title { display:flex; justify-content:space-between; align-items:center; font-size:14px; font-weight:700; color:var(--accent2); }
  .leather-title .chev { color:var(--sub); font-size:12px; margin-right:8px; transition:transform .15s; display:inline-block; }
  .leather-block[open] > .leather-title .chev { transform: rotate(90deg); }
  .leather-title .skin-name { display:flex; align-items:center; }
  .leather-body { margin-top:4px; padding-left:16px; }

  .skin-block { padding:6px 0; border-bottom:1px dashed var(--line); }
  .skin-block summary { list-style:none; cursor:pointer; }
  .skin-block summary::-webkit-details-marker { display:none; }
  .skin-title { display:flex; justify-content:space-between; align-items:center; font-size:14px; font-weight:700; }
  .skin-title .chev { color:var(--sub); font-size:12px; margin-right:8px; transition:transform .15s; display:inline-block; }
  .skin-block[open] > .skin-title .chev { transform: rotate(90deg); }
  .skin-title .skin-name { display:flex; align-items:center; }
  .skin-colors { margin-top:4px; padding-left:20px; }
  .color-row { display:flex; justify-content:space-between; gap:10px; font-size:12.5px; padding:3px 0; max-width:100%; }
  .color-chip { font-weight:600; }
  .color-row .qty { color: var(--sub); font-weight:500; }
  .note {
    background: var(--amberbg); border:1px solid #eaceA0; color:#6b4f18; border-radius:8px;
    padding:10px 14px; font-size:12.5px; margin-bottom:18px;
  }
  .small { font-size:11.5px; color: var(--sub); }
  @media (max-width: 800px) {
    .model-grid { grid-template-columns: 1fr; }
    .cal-week-grid { grid-template-columns: 1fr; }
    body { padding: 14px; font-size: 13.5px; }
    h1 { font-size: 17px; }
    .kpi { min-width: 96px; padding: 10px 12px; }
    .kpi .num { font-size: 19px; }
    .tabs { overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; flex-wrap: nowrap; }
    .tab-btn { padding: 8px 12px; font-size: 13px; flex: 0 0 auto; }
    .card { padding: 12px; border-radius: 10px; }
    .filters { gap: 6px; }
    .filter-btn { padding: 5px 11px; font-size: 12px; }
    .color-row { max-width: none; }
  }
</style>
</head>

function statusBadge(r) {
  let cls = 'b-new', label = r.effective_status;
  if (r.effective_status === 'Done') { cls = 'b-done'; }
  else if (r.effective_status === 'Reject') { cls = 'b-reject'; }
  else if (r.effective_status.indexOf('ON PROCESS') === 0) { cls = 'b-process'; }
  return '<span class="badge ' + cls + '">' + label + '</span>';
}
function flagBadges(r) {
  let out = '';
  if (r.overdue) out += ' <span class="badge b-overdue">เลยกำหนด Plan</span>';
  if (r.stale) out += ' <span class="badge b-stale">ค้าง ' + r.age_days + ' วัน ไม่มี ETA</span>';
  return out;
}

// ---------- Overview ----------
function isPlainStatus(r) {
  return r.effective_status === 'New / รอพิจารณา';
}
function renderOverview() {
  const reqs = DATA.requests;
  const done = reqs.filter(r => r.effective_status === 'Done').length;
  const proc = reqs.filter(r => r.effective_status.indexOf('ON PROCESS') === 0).length;
  const neu = reqs.filter(r => r.effective_status === 'New / รอพิจารณา').length;
  const rejected = reqs.filter(r => r.effective_status === 'Reject').length;
  const overdue = reqs.filter(r => r.overdue).length;
  const stale = reqs.filter(r => r.stale).length;

  let html = '<div class="kpi-row">';
  html += kpi(reqs.length, 'คำขอทั้งหมด', '');
  html += kpi(neu, 'ใหม่ / รอพิจารณา', 'amber');
  html += kpi(proc, 'กำลังผลิต', '');
  html += kpi(done, 'เสร็จแล้ว', 'green');
  html += kpi(rejected, 'Reject', rejected ? 'warn' : '');
  html += kpi(overdue, 'เลยกำหนด Plan', overdue ? 'warn' : '');
  html += kpi(stale, 'ค้างนาน ไม่มี ETA', stale ? 'warn' : '');
  html += '</div>';

  html += '<div class="card"><h2>รายการคำขอทั้งหมด</h2>';
  html += '<div class="filters-row">';
  html += '<div class="filters" id="statusFilters">' +
    filterBtn('all','ทั้งหมด',true) + filterBtn('new','ใหม่/รอพิจารณา') +
    filterBtn('process','กำลังผลิต') + filterBtn('done','เสร็จแล้ว') +
    filterBtn('reject','Reject') +
    filterBtn('flag','มีปัญหา (เลยกำหนด/ค้างนาน)') + '</div>';
  html += '<div class="status-legend">' +
    '<span class="legend-item"><span class="legend-dot" style="background:#a8e3bd"></span>เขียว = เสร็จแล้ว</span>' +
    '<span class="legend-item"><span class="legend-dot" style="background:var(--amberbg)"></span>เหลือง = กำลังผลิต</span>' +
    '<span class="legend-item"><span class="legend-dot" style="background:#f0a3a3"></span>แดง = ถูก Reject</span>' +
    '<span class="legend-item"><span class="legend-dot" style="background:#aecdeb"></span>ฟ้า = ใหม่/รอพิจารณา (ไม่มี Reply, Status, Plan เลย)</span>' +
    '</div>';
  html += '</div>';
  html += '<p class="small" style="margin-top:8px; line-height:1.7;">' +
    '<b>เร่งด่วน</b> = สถานะกำลังผลิต (ON PROCESS) ที่สต็อกคงเหลือของสี/หนังที่ขอเฉพาะเจาะจง เหลือน้อยกว่า 3 ชิ้น (หรือหมด)' +
    '</p>';
  html += '<div id="reqTableWrap">' + reqTable(reqs) + '</div>';
  html += '</div>';

  document.getElementById('overview').innerHTML = html;

  document.querySelectorAll('#statusFilters .filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#statusFilters .filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const f = btn.dataset.f;
      let filtered = reqs;
      if (f === 'new') filtered = reqs.filter(r=>isPlainStatus(r));
      else if (f === 'process') filtered = reqs.filter(r=>r.effective_status.indexOf('ON PROCESS')===0);
      else if (f === 'done') filtered = reqs.filter(r=>r.effective_status==='Done');
      else if (f === 'reject') filtered = reqs.filter(r=>r.effective_status==='Reject');
      else if (f === 'flag') filtered = reqs.filter(r=>r.overdue||r.stale);
      document.getElementById('reqTableWrap').innerHTML = reqTable(filtered);
    });
  });
}
function kpi(num, label, cls) {
  return '<div class="kpi ' + (cls||'') + '"><div class="num">' + num + '</div><div class="label">' + label + '</div></div>';
}
function filterBtn(f, label, active) {
  return '<button class="filter-btn' + (active?' active':'') + '" data-f="' + f + '">' + label + '</button>';
}
function fmtDate(iso) {
  if (!iso) return '-';
  const p = iso.split('-');
  if (p.length !== 3) return iso;
  return p[2] + '-' + p[1] + '-' + p[0];
}
function rowClass(r) {
  if (r.effective_status === 'Done') return 'row-done';
  if (r.effective_status === 'Reject') return 'row-reject';
  if (r.effective_status.indexOf('ON PROCESS') === 0) return 'row-process';
  if (r.effective_status === 'New / รอพิจารณา') return 'row-new';
  return '';
}
function reqStockModels(r) {
  const info = DATA.model_summary[r.model];
  if (!info || !info.stock || !(info.stock.models||[]).length) return [];
  let relevant = info.stock.models;
  if (r.size && r.size !== 'ไม่ระบุ') {
    const filtered = relevant.filter(m => m.size === r.size);
    if (filtered.length) relevant = filtered;
  }
  return relevant;
}
function stockCell(r) {
  const relevant = reqStockModels(r);
  if (!relevant.length) return '<span class="small" style="color:var(--sub)">-</span>';
  if (relevant.length === 1) {
    // single matched model+size: skip the redundant outer toggle, show model+size+qty directly
    return '<div class="stock-cell-block">' + modelDetails(relevant[0]) + '</div>';
  }
  const totalQty = relevant.reduce((s,m) => s + (m.qty||0), 0);
  let h = '<details class="stock-cell-block"><summary><span class="chev">&#9656;</span>' + totalQty + ' ชิ้น</summary>';
  h += '<div class="stock-cell-body">' + relevant.map(modelDetails).join('') + '</div>';
  h += '</details>';
  return h;
}
function requestedColorQtys(r) {
  const relevant = reqStockModels(r);
  const requestedColors = (r.color||'').split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
  if (!requestedColors.length || !relevant.length) return [];
  const reqSkinName = (r.skin1||'').toLowerCase().trim();
  if (!reqSkinName) return [];
  return requestedColors.map(rc => {
    let qty = 0;
    relevant.forEach(m => {
      (m.skins||[]).forEach(sk => {
        const skinName = (sk.skin||'').toLowerCase();
        if (!skinName.includes(reqSkinName) && !reqSkinName.includes(skinName)) return;
        (sk.colors||[]).forEach(c => {
          const cName = (c.name||'').toLowerCase();
          if (cName === rc || cName.includes(rc) || rc.includes(cName)) {
            qty += (c.qty||0);
          }
        });
      });
    });
    return { color: rc, qty: qty };
  });
}
function isUrgent(r) {
  if (r.effective_status.indexOf('ON PROCESS') !== 0) return false;
  const qtys = requestedColorQtys(r);
  if (!qtys.length) return false;
  return qtys.some(q => q.qty < 3);
}
function reqTable(reqs, sortBy) {
  let rows = reqs.slice();
  if (sortBy === 'plan') {
    rows.sort((a,b) => (a.plan_parsed||'9999').localeCompare(b.plan_parsed||'9999'));
  } else {
    rows.sort((a,b) => (b.timestamp||'').localeCompare(a.timestamp||''));
  }
  let html = '<div class="table-scroll"><table><thead><tr><th>วันที่แจ้ง</th><th>รุ่น</th><th>หนัง/สี</th><th>จำนวน</th>' +
    '<th>ผู้แจ้ง</th><th>สถานะ</th><th>Plan เข้า</th><th>Stock</th><th>หมายเหตุ</th></tr></thead><tbody>';
  rows.forEach(r => {
    const urgentBadge = isUrgent(r) ? ' <span class="badge b-urgent">เร่งด่วน</span>' : '';
    html += '<tr class="' + rowClass(r) + '"><td class="date-cell">' + fmtDate(r.timestamp) + '<div class="small">' + (r.age_days!=null?r.age_days+' วันที่แล้ว':'') + '</div></td>' +
      '<td>' + (r.model || '<i>'+(r.others||'(ไม่ระบุ)')+'</i>') + urgentBadge + '<div class="small">' + (r.size?'size '+r.size:'') + '</div></td>' +
      '<td>' + r.skin1 + (r.color? ' — '+r.color : '') + (r.skin2? '<div class="small">skin2: '+r.skin2+'</div>':'') + '</td>' +
      '<td>' + (r.qty1||'-') + (r.qty2? ' / '+r.qty2 : '') + '</td>' +
      '<td>' + r.requester + '</td>' +
      '<td>' + statusBadge(r) + flagBadges(r) + '</td>' +
      '<td class="plan-cell">' + (r.plan_raw || '-') + '</td>' +
      '<td>' + stockCell(r) + '</td>' +
      '<td class="small">' + (r.reply || '') + '</td>' +
      '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

// ---------- Production ----------
function collapseBox(title, reqs, note, sortBy, defaultOpen) {
  let h = '<details class="card-collapse"' + (defaultOpen ? ' open' : '') + '><summary class="card-collapse-title"><span class="chev">&#9656;</span>' +
    title + ' (' + reqs.length + ')</summary>';
  h += '<div class="card-collapse-body">';
  if (note) h += '<p class="small">' + note + '</p>';
  h += reqs.length ? reqTable(reqs, sortBy) : '<p class="small">ไม่มีรายการ</p>';
  h += '</div></details>';
  return h;
}
function renderProduction() {
  const reqs = DATA.requests;
  const proposed = reqs.filter(r => r.effective_status === 'New / รอพิจารณา');
  const processNoPlan = reqs.filter(r => r.effective_status === 'ON PROCESS' && !r.plan_raw);
  const processWithPlan = reqs.filter(r => r.effective_status === 'ON PROCESS' && r.plan_raw);
  const doneReqs = reqs.filter(r => r.effective_status === 'Done');
  const rejectReqs = reqs.filter(r => r.effective_status === 'Reject');

  let html = '';
  html += collapseBox('เสนอขอที่ยังไม่ดำเนินการ', proposed, 'รายการที่ยังไม่มี Reply, Status หรือ Plan เลย — รอการพิจารณา', null, true);
  html += collapseBox('ON PROCESS ที่ยังไม่มีกำหนดวันเข้า', processNoPlan, 'กำลังผลิตอยู่ แต่ยังไม่มีวันที่คาดว่าสินค้าจะเข้า ต้องติดตามเป็นพิเศษ', null, true);
  html += collapseBox('ON PROCESS เรียงตามกำหนดวันเข้าใกล้สุดก่อน', processWithPlan, null, 'plan', true);
  html += collapseBox('เสร็จแล้ว (Done)', doneReqs);
  html += collapseBox('Reject', rejectReqs);

  document.getElementById('production').innerHTML = html;
}

function colorHex(name) {

  for (const [key, hex] of COLOR_MAP) {
    if (n.indexOf(key) !== -1) return hex;
  }
  return '#3a3530';
}
function colorSpan(name) {
  return '<span class="color-chip" style="color:' + colorHex(name) + '">' + name + '</span>';
}
function colorRow(c) {
  return '<div class="color-row">' + colorSpan(c.name) + '<span class="qty">' + c.qty + ' ชิ้น</span></div>';
}

// ---------- Sales ----------
function skinDetails(s) {
  let h = '<details class="skin-block">';
  h += '<summary class="skin-title"><span class="skin-name"><span class="chev">&#9656;</span>' + s.skin + '</span><span>' + s.qty + ' ชิ้น</span></summary>';
  h += '<div class="skin-colors">' + (s.colors||[]).map(colorRow).join('') + '</div>';
  h += '</details>';
  return h;
}
const LEATHER_CATS = [
  { label: 'Crocodile', test: s => /crocodile|siamese/i.test(s) },
  { label: 'Ostrich', test: s => /ostrich|orstich|ostich/i.test(s) },
  { label: 'Python', test: s => /python/i.test(s) },
  { label: 'Stingray', test: s => /stingray/i.test(s) },
  { label: 'Sea Snake', test: s => /sea\s*snake/i.test(s) },
  { label: 'Lamb', test: s => /lamb/i.test(s) },
  { label: 'Cobra', test: s => /cobra/i.test(s) },
  { label: 'Water Snake', test: s => /water\s*snake/i.test(s) },
  { label: 'Caiman', test: s => /caiman/i.test(s) },
  { label: 'Leather', test: s => /^leather$|normal\s*skin/i.test(s) },
];
function categorizeSkin(name) {
  for (const cat of LEATHER_CATS) {
    if (cat.test(name)) return cat.label;
  }
  return 'Other';
}
function leatherGroup(catLabel, skins) {
  const qty = skins.reduce((sum, s) => sum + (s.qty||0), 0);
  let h = '<details class="leather-block">';
  h += '<summary class="leather-title"><span class="skin-name"><span class="chev">&#9656;</span>' + catLabel + '</span><span>' + qty + ' ชิ้น</span></summary>';
  h += '<div class="leather-body">' + skins.map(skinDetails).join('') + '</div>';
  h += '</details>';
  return h;
}
function mergePythonGrades(skins) {
  const merged = {};
  skins.forEach(s => {
    const trimmed = (s.skin||'').trim();
    const suffixMatch = trimmed.match(/\s+([RM])$/i);
    const base = trimmed.replace(/\s+[RM]$/i, '').replace(/\s+/g, ' ').trim();
    if (!merged[base]) merged[base] = { base: base, qty: 0, colorMap: {}, hasR: false, hasM: false };
    merged[base].qty += s.qty || 0;
    if (suffixMatch) {
      const letter = suffixMatch[1].toUpperCase();
      if (letter === 'R') merged[base].hasR = true;
      if (letter === 'M') merged[base].hasM = true;
    }
    (s.colors||[]).forEach(c => {
      if (!merged[base].colorMap[c.name]) merged[base].colorMap[c.name] = 0;
      merged[base].colorMap[c.name] += c.qty || 0;
    });
  });
  return Object.values(merged).map(m => {
    let suffix = '';
    if (m.hasR && m.hasM) suffix = ' R+M';
    else if (m.hasR) suffix = ' R';
    else if (m.hasM) suffix = ' M';
    return {
      skin: m.base + suffix,
      qty: m.qty,
      colors: Object.entries(m.colorMap).map(([name, qty]) => ({name: name, qty: qty})).sort((a,b)=>b.qty-a.qty)
    };
  }).sort((a,b)=>b.qty-a.qty);
}
function modelDetails(mo) {
  const label = mo.model + (mo.size && mo.size !== 'ไม่ระบุ' ? ' #' + mo.size : '');
  let h = '<details class="model-block">';
  h += '<summary class="model-sub-title"><span class="skin-name"><span class="chev">&#9656;</span>' + label + '</span><span>' + mo.qty + ' ชิ้น</span></summary>';
  const groups = {};
  (mo.skins||[]).forEach(s => {
    const cat = categorizeSkin(s.skin);
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(s);
  });
  if (groups['Python']) {
    groups['Python'] = mergePythonGrades(groups['Python']);
  }
  const order = LEATHER_CATS.map(c => c.label).concat(['Other']);
  let body = '';
  order.forEach(catLabel => {
    if (groups[catLabel] && groups[catLabel].length) {
      body += leatherGroup(catLabel, groups[catLabel]);
    }
  });
  h += '<div class="model-sub-body">' + body + '</div>';
  h += '</details>';
  return h;
}

function qualifiesOpen(r) {
  if (r.effective_status === 'Done') return false;
  if (r.effective_status === 'Reject' && (r.age_days||0) > 14) return false;
  return true;
}

function bestsellerAlertBlock(m) {
  const info = DATA.bestseller_alerts && DATA.bestseller_alerts[m];
  if (!info) return '';
  if (!info.has_data) {
    return '<div class="bestseller-note small">ไม่มีข้อมูลยอดขายย้อนหลังของรุ่นนี้ในสาขาที่ดูแล</div>';
  }
  const items = info.bestsellers || [];
  const lowStock = items.filter(it => it.low_stock);
  if (items.length === 0) {
    return '<div class="bestseller-note small">มีข้อมูลยอดขายย้อนหลัง แต่ยังไม่มีสี/หนังไหนขายเกิน 5 ชิ้นใน 3 ปี</div>';
  }
  let h = '';
  if (lowStock.length) {
    h += '<div class="bestseller-alert">';
    h += '<div class="bestseller-alert-title">&#9888; สต็อกสีขายดีใกล้หมด (คงคลัง &lt; 3 เดือน) &mdash; ควรแจ้งเบิกเพิ่ม</div>';
    lowStock.forEach(it => {
      h += '<div class="bestseller-row">' +
        '<div class="bestseller-row-label">' + m + ' #' + it.size + ' ' + it.skin + ' / ' + it.color + '</div>' +
        '<div class="bestseller-row-value">เหลือ ' + it.cur_stock + ' ชิ้น (ขาย ' + it.hist_qty + ' ชิ้น/' + it.active_months + ' เดือนที่วางขาย = ' + it.monthly_rate + ' ชิ้น/เดือน) Stock คงเหลือ &asymp; ' + it.months_cover + ' เดือน</div>' +
        '</div>';
    });
    h += '</div>';
  }
  return h;
}
const CORE_MODELS = ['Austin','Barzaar 3/4','Belt Auto Buckle','Cervin With Handle','Claudia','Daisy Sling','Fairy','Fairy Square','Round Zipper Open','Round Zipper','Sarah','Selena','Stuffy','US Card','Maria','Corey','Goldmas','Rosalie','Emma','Grandmax','Vanna','Fujiri'];
function renderSales() {
  const allModels = Object.keys(DATA.model_summary);
  const latest = m => DATA.requests.filter(r => r.model === m).reduce((mx, r) => (r.timestamp||'') > mx ? (r.timestamp||'') : mx, '');
  const hasOpenReq = m => DATA.requests.some(r => r.model === m && qualifiesOpen(r));

  const withReq = allModels.filter(hasOpenReq).sort((a, b) => latest(b).localeCompare(latest(a)));
  const withoutReq = CORE_MODELS.filter(m => DATA.model_summary[m] && !hasOpenReq(m)).sort((a, b) => a.localeCompare(b));

  let html = '';
  let printedDivider = false;

  withReq.concat(withoutReq).forEach(m => {
    if (!printedDivider && withReq.indexOf(m) === -1) {
      html += '<h2 class="core-divider">สินค้า Core &mdash; ไม่มีคำขอผลิตค้างอยู่ตอนนี้</h2>';
      printedDivider = true;
    }
    const info = DATA.model_summary[m];
    const openReqs = DATA.requests.filter(r => r.model === m && qualifiesOpen(r));
    const stock = info.stock || {};

    html += '<div class="model-card"><h3>' + m + '</h3>';
    html += '<div class="model-grid">';

    html += '<div><div class="col-title">คำขอที่ยังค้างอยู่ (' + openReqs.length + ')</div>';
    if (openReqs.length === 0) {
      html += '<div class="small">ไม่มีคำขอค้างอยู่ตอนนี้</div>';
    } else {
      const bySize = {};
      openReqs.forEach(r => {
        const sz = r.size || 'ไม่ระบุ size';
        if (!bySize[sz]) bySize[sz] = [];
        bySize[sz].push(r);
      });
      Object.keys(bySize).sort().forEach(sz => {
        html += '<div class="req-size-label">Size ' + sz + '</div>';
        bySize[sz].forEach(r => {
          html += '<div class="mini-row"><span>' + r.skin1 + ' / ' + r.color + ' (' + (r.qty1||'-') + ')</span>' +
            '<span>' + statusBadge(r) + '</span></div>';
        });
      });
    }
    html += '</div>';

    html += '<div><div class="col-title">สต็อกคงเหลือปัจจุบัน &mdash; รวม ' + (stock.total_qty!=null?stock.total_qty:'-') + ' ชิ้น</div>';
    if ((stock.models||[]).length === 0) html += '<div class="small">ไม่มีสต็อกในสาขาที่ดูแล</div>';
    html += (stock.models || []).map(modelDetails).join('');
    html += '</div>';

    html += '</div>';
    html += bestsellerAlertBlock(m);
    html += '</div>';
  });

  document.getElementById('sales').innerHTML = html;
}

// ---------- Calendar ----------
function calItemLabel(r) {
  let name = r.model || r.others || '(ไม่ระบุชื่อ)';
  let seg = name + (r.size ? ' #' + r.size : '') + ' ' + r.skin1 + ' = ' + (r.qty1 || '-');
  if (r.skin2) seg += ' , ' + r.skin2 + ' = ' + (r.qty2 || '-');
  return seg;
}
function calSum(list) {
  return list.reduce((s, r) => s + (parseFloat(r.qty1)||0) + (parseFloat(r.qty2)||0), 0);
}
function calSection(label, list) {
  let h = '<div class="cal-section-label">' + label + ' (' + list.length + ')</div>';
  if (list.length === 0) { h += '<div class="cal-empty">ไม่มี</div>'; return h; }
  list.forEach(r => {
    h += '<div class="cal-item">' + calItemLabel(r) + '</div>';
  });
  return h;
}
const MONTH_TH_NAMES = ['', 'มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
function lastDayOfMonth(year, month) {
  return new Date(year, month, 0).getDate();
}
function renderCalendar() {
  const dated = DATA.requests.filter(r => r.calendar_year);
  const undated = DATA.requests.filter(r => !r.calendar_year && r.effective_status !== 'Done' && r.effective_status !== 'Reject');

  const months = {};
  dated.forEach(r => {
    const key = r.calendar_year + '-' + r.calendar_month_num;
    if (!months[key]) months[key] = { year: r.calendar_year, month: r.calendar_month_num, weeks: {'1-7':[], '8-14':[], '15-21':[], '22+':[]} };
    months[key].weeks[r.calendar_week].push(r);
  });

  const monthKeys = Object.keys(months).sort((a,b) => {
    const [ay,am] = a.split('-').map(Number), [by,bm] = b.split('-').map(Number);
    return ay - by || am - bm;
  });

  let html = '<div class="card"><p class="small">จัดกลุ่มตามช่อง &quot;Plan สินค้าเข้า&quot; ในคำขอสินค้า &mdash; ' +
    'New Design คือรุ่นที่ยังไม่มีชื่อในระบบสต็อก (ใช้ชื่อบรรยายจากช่อง Others), Re-Stock คือรุ่นที่มีอยู่แล้ว</p></div>';

  monthKeys.forEach(key => {
    const mo = months[key];
    const lastDay = lastDayOfMonth(mo.year, mo.month);
    const weekDefs = [['1-7','วันที่ 1-7'], ['8-14','วันที่ 8-14'], ['15-21','วันที่ 15-21'], ['22+','วันที่ 22-' + lastDay]];
    html += '<div class="cal-month"><h3>' + MONTH_TH_NAMES[mo.month] + ' ' + mo.year + '</h3><div class="cal-week-grid">';
    weekDefs.forEach(([wk, label]) => {
      const items = mo.weeks[wk] || [];
      const newDesign = items.filter(r => r.is_new_design);
      const restock = items.filter(r => !r.is_new_design);
      html += '<div class="cal-week-card">';
      html += '<div class="cal-week-title">' + label + '</div>';
      if (items.length === 0) {
        html += '<div class="cal-empty">ไม่มีคำขอในช่วงนี้</div>';
      } else {
        html += calSection('New Design', newDesign);
        html += calSection('Re-Stock', restock);
        html += '<div class="cal-total"><span>รวม</span><span>' + calSum(items) + ' ชิ้น</span></div>';
      }
      html += '</div>';
    });
    html += '</div></div>';
  });

  html += '<div class="card"><h2>ยังไม่มีกำหนด Plan สินค้าเข้า (' + undated.length + ' รายการ)</h2>';
  html += '<p class="small">รายการเหล่านี้ยังไม่มีวันที่ระบุ เลยจัดลงปฏิทินไม่ได้ ต้องติดตามแยก</p>';
  html += reqTable(undated);
  html += '</div>';

  document.getElementById('calendar').innerHTML = html;
}

(function computeFlags() {
  const today = new Date().toISOString().slice(0,10);
  const todayMs = new Date(today + 'T00:00:00Z').getTime();
  DATA.requests.forEach(r => {
    if (r.timestamp) {
      const tsMs = new Date(r.timestamp + 'T00:00:00Z').getTime();
      r.age_days = Math.max(0, Math.round((todayMs - tsMs) / 86400000));
    }
    const isOpen = r.effective_status !== 'Done' && r.effective_status !== 'Reject';
    r.overdue = !!(isOpen && r.plan_parsed && r.plan_parsed < today);
    r.stale = !!(r.effective_status.indexOf('ON PROCESS') === 0 && !r.plan_raw && (r.age_days||0) > 14);
  });
})();

renderSales();
renderCalendar();
